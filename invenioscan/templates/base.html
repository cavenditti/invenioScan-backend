<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Shelfscan{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  {% block head %}{% endblock %}
</head>
<body>
  {% block nav %}
  <nav class="top-nav">
    <ul>
      <li><strong class="nav-brand"><a href="/">📚 Shelfscan</a></strong></li>
    </ul>
    {% if user %}
    <ul>
      <li><a href="/books">Books</a></li>
      <li><a href="/shelves">Shelves</a></li>
      <li><a href="/qr">QR Codes</a></li>
      {% if user.is_admin %}<li><a href="/admin/users">Users</a></li>{% endif %}
      <li><a href="/logout">Logout ({{ user.username }})</a></li>
    </ul>
    {% endif %}
  </nav>
  {% endblock %}

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="container footer-muted">
    Shelfscan &mdash; Book position tracker
  </footer>
</body>
</html>
