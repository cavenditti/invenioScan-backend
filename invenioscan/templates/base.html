<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Shelfscan{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    /* ── Pico overrides — match mobile app palette ── */
    :root {
      --pico-primary: #8b5e34;
      --pico-primary-hover: #6d3d14;
      --pico-primary-focus: rgba(139, 94, 52, .25);
      --pico-primary-inverse: #fffaf2;
      --pico-background-color: #f4efe6;
      --pico-card-background-color: #fffaf2;
      --pico-card-sectioning-background-color: #f9f4ec;
      --pico-border-radius: 14px;
      --pico-form-element-border-color: #d9c5aa;
      --pico-form-element-active-border-color: #8b5e34;
      --pico-form-element-focus-color: rgba(139, 94, 52, .25);
      --pico-form-element-background-color: #fff;
      --pico-color: #2e2418;
      --pico-muted-color: #5b4c3b;
      --pico-muted-border-color: #e8dbc6;
      --pico-table-border-color: #e8dbc6;
      --pico-card-border-color: #e8dbc6;
      --pico-secondary: #5b4c3b;
      --pico-secondary-hover: #2e2418;
    }

    body { background: var(--pico-background-color); color: var(--pico-color); }

    /* ── Nav ── */
    nav.top-nav {
      background: #2e2418;
      padding: .75rem 1.5rem;
      margin-bottom: 0;
    }
    nav.top-nav ul { margin: 0; list-style: none; padding: 0; }
    nav.top-nav a, nav.top-nav strong { color: #f4efe6 !important; text-decoration: none; }
    nav.top-nav a:hover { color: #d9c5aa !important; }
    nav.top-nav .nav-brand { font-size: 1.05rem; letter-spacing: .02em; }

    /* ── Cards ── */
    .card {
      background: #fffaf2;
      border: 1px solid #e8dbc6;
      border-radius: 24px;
      padding: 1.5rem;
    }
    article {
      border-radius: 24px !important;
      border: 1px solid #e8dbc6;
    }

    /* ── Pill buttons ── */
    .btn-pill, a.btn-pill {
      border-radius: 999px !important;
      padding: .6rem 1.5rem;
      font-weight: 700;
      font-size: .95rem;
      display: inline-block;
      text-decoration: none;
      cursor: pointer;
      text-align: center;
      line-height: 1.4;
    }
    .btn-pill-primary, a.btn-pill-primary {
      background: #8b5e34;
      color: #fffaf2 !important;
      border: 2px solid #8b5e34;
    }
    .btn-pill-primary:hover { background: #6d3d14; border-color: #6d3d14; }
    .btn-pill-outline, a.btn-pill-outline {
      background: transparent;
      color: #8b5e34 !important;
      border: 2px solid #8b5e34;
    }
    .btn-pill-outline:hover { background: #8b5e34; color: #fffaf2 !important; }
    .btn-pill-danger, a.btn-pill-danger {
      background: transparent;
      color: #991b1b !important;
      border: 2px solid #991b1b;
    }
    .btn-pill-danger:hover { background: #991b1b; color: #fff !important; }
    .btn-pill-sm {
      padding: .35rem 1rem;
      font-size: .82rem;
    }

    /* ── Kicker label ── */
    .kicker {
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #8b5e34;
      margin-bottom: .25rem;
    }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: .2em .65em;
      border-radius: 999px;
      font-size: .78em;
      font-weight: 600;
      letter-spacing: .02em;
    }
    .badge-pending { background: #fde68a; color: #92400e; }
    .badge-approved { background: #bbf7d0; color: #166534; }
    .badge-denied { background: #fecaca; color: #991b1b; }

    /* ── Stat cards ── */
    .stat-card { text-align: center; padding: 1.5rem; }
    .stat-card h2 { margin: 0; font-size: 2.5rem; color: #8b5e34; }
    .stat-card p { margin: .25rem 0 0; color: #5b4c3b; }

    /* ── Flash messages ── */
    .flash-success {
      background: #bbf7d0; color: #166534;
      padding: .75rem 1rem; border-radius: 14px;
      margin-bottom: 1rem;
    }
    .flash-error {
      background: #fecaca; color: #991b1b;
      padding: .75rem 1rem; border-radius: 14px;
      margin-bottom: 1rem;
    }

    /* ── Tables ── */
    table { font-size: .92rem; }

    /* ── HTMX loading ── */
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-block; }

    /* ── Utilities ── */
    .text-muted { color: #7d684f; }
    .text-center { text-align: center; }
    .mt-0 { margin-top: 0; }
    .mt-1 { margin-top: 1rem; }
    .mt-2 { margin-top: 2rem; }
    .mb-0 { margin-bottom: 0; }
    .mb-1 { margin-bottom: 1rem; }
    .gap-row { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }

    /* ── Page header with action ── */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-top: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .page-header hgroup { margin: 0; }

    /* ── Description list styling ── */
    dl { display: grid; grid-template-columns: auto 1fr; gap: .35rem 1.25rem; }
    dt { font-weight: 600; color: #5b4c3b; }
    dd { margin: 0; }

    /* ── Responsive helper ── */
    @media (max-width: 576px) {
      .page-header { flex-direction: column; }
      dl { grid-template-columns: 1fr; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {% block nav %}
  <nav class="top-nav">
    <ul>
      <li><strong class="nav-brand"><a href="/">📚 Shelfscan</a></strong></li>
    </ul>
    {% if user %}
    <ul>
      <li><a href="/books">Books</a></li>
      <li><a href="/shelves">Shelves</a></li>
      {% if user.is_admin %}<li><a href="/admin/users">Users</a></li>{% endif %}
      <li><a href="/logout">Logout ({{ user.username }})</a></li>
    </ul>
    {% endif %}
  </nav>
  {% endblock %}

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="container" style="text-align:center; padding:2rem 0; color:#7d684f; font-size:.85rem;">
    Shelfscan &mdash; Book position tracker
  </footer>
</body>
</html>
