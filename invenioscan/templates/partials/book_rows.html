{% for book in books %}
<tr>
  <td><a href="/books/{{ book.id }}">{{ book.title }}</a></td>
  <td>{{ book.author or "—" }}</td>
  <td>{{ book.isbn or "—" }}</td>
  <td>{{ book.document_type }}</td>
  <td>{{ book.publication_year or "—" }}</td>
</tr>
{% else %}
<tr><td colspan="5" class="text-center text-muted">No books found</td></tr>
{% endfor %}
