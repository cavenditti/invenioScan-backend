{% extends "base.html" %}
{% block title %}QR Code Generator — Shelfscan{% endblock %}
{% block content %}
<div class="page-header">
  <hgroup>
    <p class="kicker">Tools</p>
    <h1 class="mt-0">QR Code Generator</h1>
    <p class="text-muted">Generate printable QR label sheets. Shelves referenced in the codes will be created automatically when scanned.</p>
  </hgroup>
</div>

<div class="card">
  <form method="post" action="/qr" target="_blank">
    <div class="grid">
      <label>
        Rows (comma-separated)
        <input type="text" name="rows" placeholder="A,B,C" value="{{ rows or '' }}" required>
      </label>
    </div>
    <div class="grid">
      <label>
        Positions from
        <input type="number" name="pos_from" value="{{ pos_from or 1 }}" min="1" required>
      </label>
      <label>
        Positions to
        <input type="number" name="pos_to" value="{{ pos_to or 10 }}" min="1" required>
      </label>
    </div>
    <div class="grid">
      <label>
        Height from
        <input type="number" name="height_from" value="{{ height_from or 1 }}" min="1" required>
      </label>
      <label>
        Height to
        <input type="number" name="height_to" value="{{ height_to or 5 }}" min="1" required>
      </label>
    </div>
    <button type="submit" class="btn-pill btn-pill-primary mt-1">Generate &amp; Print</button>
  </form>
</div>
{% endblock %}
